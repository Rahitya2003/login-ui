<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<style>
    /* Background gradient */
    body {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
    }

    /* Form container */
    .parent-container {
        background: linear-gradient(to bottom right, #ffffff, #f2f2f2);
        width: 350px;
        border-radius: 15px;
        padding: 30px 25px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
    }

    .parent-container h3 {
        margin-bottom: 25px;
        color: #333;
        background: linear-gradient(to right, #ff416c, #ff4b2b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 1.8rem;
    }

    /* Input fields */
    .form-field {
        margin: 15px 0;
    }

    .form-field input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .form-field input:focus {
        border: 2px solid #ff416c;
        box-shadow: 0 0 10px rgba(255,65,108,0.3);
    }

    /* Checkbox */
    .form-checkbox {
        display: flex;
        align-items: center;
        font-size: 0.85rem;
        margin: 15px 0;
        gap: 5px;
    }

    .form-checkbox a {
        color: #ff416c;
        text-decoration: none;
        font-weight: bold;
    }

    .form-checkbox a:hover {
        text-decoration: underline;
    }

    /* Gradient button */
    .btn-grad {
        background-image: linear-gradient(to right, #ff416c, #ff4b2b);
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.5s;
        box-shadow: 0 5px 15px rgba(255,65,108,0.4);
    }

    .btn-grad:hover {
        background-image: linear-gradient(to right, #ff4b2b, #ff416c);
        box-shadow: 0 8px 20px rgba(255,65,108,0.6);
    }

    /* Login link */
    .login-link {
        margin-top: 20px;
        font-size: 0.9rem;
    }

    .login-link a {
        color: #2575fc;
        font-weight: bold;
        text-decoration: none;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<form class="parent-container">
    <h3>CREATE ACCOUNT</h3>
    <div class="form-field">
        <input type="text" placeholder="Your name" required />
    </div>
    <div class="form-field">
        <input type="email" placeholder="Your email" required />
    </div>
    <div class="form-field">
        <input type="password" placeholder="Password" required />
    </div>
    <div class="form-field">
        <input type="password" placeholder="Repeat your password" required />
    </div>
    <div class="form-checkbox">
        <input type="checkbox" id="agree" required />
        <label for="agree"> I agree to all statements in
            <a href="#">Terms of Service</a>
        </label>
    </div>
    <button class="btn-grad">SIGN UP</button>
    <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</form>

</body>
</html>
